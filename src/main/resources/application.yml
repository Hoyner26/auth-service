spring:
  application:
    name: auth-service
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${PORT:8080}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  session:
    expiration-hours: ${SESSION_EXPIRATION_HOURS:24}
  cors:
    allowed-origins: ${FRONTEND_URL:http://localhost:5173}
  admin:
    email: ${ADMIN_EMAIL:admin@explorecr.com}
    password: ${ADMIN_PASSWORD:}
